* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  color: #dbeafe;
  font-family: Arial, sans-serif;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)), 
              url("/product-box.png") center/cover no-repeat;
  background-attachment: scroll;
  padding: 22px;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 35%, rgba(56,189,248,0.2), transparent 28%),
              radial-gradient(circle at 50% 80%, rgba(249,115,22,0.28), transparent 40%);
  pointer-events: none;
  animation: shimmer 8s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.95; }
}
.wrap { max-width: 560px; margin: auto; position: relative; z-index: 2; }
.card {
  border-radius: 28px;
  padding: 24px;
  background: rgba(4, 8, 18, 0.85);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(56,189,248,0.45);
  box-shadow: 0 0 45px rgba(56,189,248,0.25), 0 0 90px rgba(249,115,22,0.18);
}
.hero-box-wrap { display: flex; justify-content: center; margin-bottom: 18px; }
.hero-box {
  width: 100%; max-width: 440px; border-radius: 20px;
  filter: drop-shadow(0 0 20px rgba(56,189,248,0.8)) drop-shadow(0 0 50px rgba(249,115,22,0.5));
}
.brand { text-align: center; margin-bottom: 24px; }
h1 { font-size: 42px; line-height: 0.95; color: #38bdf8; text-shadow: 0 0 15px #0284c7; }
.mg { color: #bfdbfe; letter-spacing: 4px; font-size: 14px; }
.tagline { color: #fb923c; font-size: 13px; margin-top: 8px; }
.package, .token-btn {
  width: 100%; padding: 16px; margin: 8px 0; border-radius: 16px;
  border: 1px solid rgba(56,189,248,0.55); background: rgba(2,6,23,0.9);
  color: #e0f2fe; font-size: 16px; cursor: pointer;
}
.package:hover, .package.selected, .token-btn.selected {
  background: rgba(12,74,110,0.8); border-color: #38bdf8;
}
