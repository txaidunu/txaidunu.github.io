<script>
// ==================== SOLANA PAY + IMPROVED DESKTOP DETECTION ====================
const WALLET_ADDRESS = 'H115kTVj5QsT58w6Xg9hviyoALWqVZ1DLTvhVDeQ66w4';
const SUPABASE_URL = 'https://aeqhjftkaikfquafwwdm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlcWhqZnRrYWlrZnF1YWZ3d2RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODMzMjMsImV4cCI6MjA5MzE1OTMyM30.jKE8LX8-uuYCWiJ6WaeAjXFU0FcWK1n7Q9X6axBId98';

let selectedToken = null;

const TOKEN_MINTS = {
  SOL: null,
  USDC: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
  USDT: 'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB'
};

async function getTokenAmount(token) {
  if (token === 'USDC' || token === 'USDT') return 188;
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
    const data = await res.json();
    const solPrice = data.solana?.usd || 150;
    return (188 / solPrice).toFixed(6);
  } catch (e) {
    return (188 / 150).toFixed(6);
  }
}

function isPhantomInstalled() {
  return typeof window.solana !== 'undefined' && window.solana?.isPhantom === true;
}

async function connectPhantom() {
  if (!isPhantomInstalled()) return false;
  try {
    await window.solana.connect();
    return true;
  } catch (e) {
    return false;
  }
}

function selectPackage(btn) {
  document.querySelectorAll('.package').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById("form").style.display = "block";
}

function selectToken(token, btn) {
  selectedToken = token;
  document.querySelectorAll('.token-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function showDisclaimerModal() {
  const debug = document.getElementById("debug");
  debug.innerText = "";
  if (!selectedToken) return debug.innerText = "Please select a payment token.";
  document.getElementById("disclaimerModal").style.display = "flex";
}

function acceptDisclaimer() {
  document.getElementById("disclaimerModal").style.display = "none";
  createOrder();
}

async function createOrder() {
  const debug = document.getElementById("debug");
  debug.innerText = "Creating order...";

  const name = document.getElementById("name").value.trim();
  const street = document.getElementById("address").value.trim();
  const city = document.getElementById("city").value.trim();
  const state = document.getElementById("state").value.trim();
  const zip = document.getElementById("zip").value.trim();

  if (!name || !street || !city || !state || !zip) {
    return debug.innerText = "Please fill all shipping fields.";
  }

  try {
    const orderData = {
      customer_name: name,
      street: street,
      city: city,
      state: state,
      zip: zip,
      payment_token: selectedToken,
      usd_amount: 188,
      status: "pending"
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Prefer": "return=representation"
      },
      body: JSON.stringify(orderData)
    });

    const data = await res.json();
    if (!res.ok || !data || !data[0]) throw new Error("Failed to create order");

    debug.innerText = "Order created!";
    await showPaymentScreen(data[0]);
  } catch (err) {
    debug.innerText = "Error: " + err.message;
  }
}

async function showPaymentScreen(order) {
  const tokenAmount = await getTokenAmount(selectedToken);
  let payUrl = "";

  if (selectedToken === "SOL") {
    payUrl = `solana:${WALLET_ADDRESS}?amount=${tokenAmount}&label=Melatonin%20M%C3%A9lange&message=Order_${order.id}`;
  } else {
    const mint = TOKEN_MINTS[selectedToken];
    payUrl = `solana:${WALLET_ADDRESS}?amount=${tokenAmount}&spl-token=${mint}&label=Melatonin%20M%C3%A9lange&message=Order_${order.id}`;
  }

  document.getElementById("amount").innerHTML = `Send exactly <strong>${tokenAmount} ${selectedToken}</strong> (≈ $188)`;

  const paylink = document.getElementById("paylink");
  paylink.href = payUrl;

  if (isPhantomInstalled()) {
    paylink.innerText = "Pay with Phantom (Desktop)";
    paylink.onclick = async (e) => {
      e.preventDefault();
      const connected = await connectPhantom();
      if (connected) {
        window.location.href = payUrl;
      } else {
        window.open(payUrl, '_blank');
      }
    };
  } else {
    paylink.innerText = "Open Phantom Wallet";
  }

  document.getElementById("qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(payUrl)}`;
  document.getElementById("payment").style.display = "block";

  pollForPayment(order.id);
}

function pollForPayment(orderId) {
  let attempts = 0;
  const interval = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}&select=status`, {
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const data = await res.json();
      if (data && data[0] && data[0].status === "paid") {
        document.getElementById("status").innerHTML = `✅ <strong>Payment Confirmed!</strong><br>Thank you. Your order will ship soon.`;
        clearInterval(interval);
      } else {
        document.getElementById("status").innerText = `Waiting for payment... (${attempts})`;
      }
    } catch (e) {}
  }, 8000);
}
</script>
</body>
